<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Quote</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e8e6df;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .stage {
    max-width: 760px;
    padding: 48px;
    text-align: center;
    position: relative;
  }

  .quote-mark {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 96px;
    line-height: 0.5;
    color: rgba(255,255,255,0.08);
    display: block;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
    animation-delay: 0.3s;
  }

  .quote-text {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.45;
    color: #f0ede6;
    letter-spacing: 0.01em;
    opacity: 0;
    animation: riseIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.6s;
  }

  .attribution {
    margin-top: 36px;
    opacity: 0;
    animation: riseIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 3.8s;
  }

  .dash {
    display: inline-block;
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    vertical-align: middle;
    margin-right: 10px;
  }

  .name {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes riseIn {
    from {
      opacity: 0;
      transform: translateY(14px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>
  <div class="stage">
    <span class="quote-mark">"</span>
    <div class="quote-text">It takes courage to make a fool of yourself.</div>
    <div class="attribution">
      <span class="dash"></span>
      <span class="name">Charlie Chaplin</span>
    </div>
  </div>
</body>
</html>
