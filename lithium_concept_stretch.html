<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Stretch — Dosing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1b2a;
    color: #f5f0e8;
    font-family: 'Source Sans 3', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .stage {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 60px;
    max-width: 1100px;
    width: 100%;
    padding: 40px 60px;
    align-items: center;
  }
  .left { display: flex; flex-direction: column; justify-content: center; }
  .pre-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #c9a84c;
    opacity: 0.75;
    margin-bottom: 14px;
  }
  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.0em;
    font-weight: 700;
    color: #f5f0e8;
    line-height: 1.2;
    margin-bottom: 32px;
  }
  .gold-rule { width: 50px; height: 2px; background: #c9a84c; margin-bottom: 32px; }
  .bullets { list-style: none; padding: 0; }
  .bullets li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 24px;
    font-size: 1.0em;
    line-height: 1.6;
    color: rgba(245,240,232,0.85);
  }
  .bullets li:last-child { margin-bottom: 0; }
  .bullet-dot {
    flex-shrink: 0;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #c9a84c;
    margin-top: 9px;
  }
  .bullets li strong { color: #f5f0e8; font-weight: 600; }
  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 440px;
  }
</style>
</head>
<body>
<div class="stage">

  <div class="left">
    <div class="pre-label">Concept Stretch</div>
    <h2>Acute vs.<br>Maintenance Dosing</h2>
    <div class="gold-rule"></div>
    <ul class="bullets">
      <li>
        <div class="bullet-dot"></div>
        <span>It takes <strong>more energy to move</strong> an object than to sustain it in place</span>
      </li>
      <li>
        <div class="bullet-dot"></div>
        <span><strong>Acute</strong> medication indications AND dosing <strong>may be different</strong> than maintenance medications</span>
      </li>
    </ul>
  </div>

  <div class="right">
    <svg viewBox="0 0 280 440" xmlns="http://www.w3.org/2000/svg" width="280" height="440">

      <!-- MAINTENANCE PLATFORM top -->
      <rect x="30" y="10" width="200" height="16" rx="3" fill="#1e3352" stroke="#c9a84c" stroke-width="1.5"/>
      <rect x="34" y="0" width="3" height="12" fill="#c9a84c" opacity="0.7"/>
      <rect x="223" y="0" width="3" height="12" fill="#c9a84c" opacity="0.7"/>
      <rect x="34" y="0" width="192" height="2.5" rx="1" fill="#c9a84c" opacity="0.5"/>
      <rect x="50" y="2" width="30" height="20" rx="2" fill="#c9a84c" opacity="0.65"/>
      <rect x="85" y="4" width="24" height="18" rx="2" fill="#c9a84c" opacity="0.45"/>
      <rect x="115" y="1" width="34" height="22" rx="2" fill="#c9a84c" opacity="0.6"/>
      <rect x="155" y="3" width="26" height="19" rx="2" fill="#c9a84c" opacity="0.5"/>
      <text x="130" y="40" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="12" font-weight="600" fill="#c9a84c">Maintenance</text>
      <text x="130" y="53" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9.5" fill="rgba(245,240,232,0.5)">medications and dosing</text>

      <!-- SCISSOR MECHANISM — 3 stages, proper pivot points -->
      <!-- Each stage: two diagonal arms crossing at center, pinned at 4 corners -->

      <!-- Stage 3 top: corners at (55,62),(205,62),(55,152),(205,152) -->
      <line x1="55" y1="62" x2="205" y2="152" stroke="#4a7090" stroke-width="4" stroke-linecap="round"/>
      <line x1="205" y1="62" x2="55" y2="152" stroke="#4a7090" stroke-width="4" stroke-linecap="round"/>
      <circle cx="130" cy="107" r="5.5" fill="#0d1b2a" stroke="#6a9ab0" stroke-width="2"/>
      <circle cx="55" cy="62" r="4.5" fill="#1a3050" stroke="#5a8aa0" stroke-width="1.5"/>
      <circle cx="205" cy="62" r="4.5" fill="#1a3050" stroke="#5a8aa0" stroke-width="1.5"/>
      <circle cx="55" cy="152" r="4.5" fill="#1a3050" stroke="#5a8aa0" stroke-width="1.5"/>
      <circle cx="205" cy="152" r="4.5" fill="#1a3050" stroke="#5a8aa0" stroke-width="1.5"/>

      <!-- Stage 2 mid: corners at (55,152),(205,152),(55,242),(205,242) -->
      <line x1="55" y1="152" x2="205" y2="242" stroke="#3d6480" stroke-width="4" stroke-linecap="round"/>
      <line x1="205" y1="152" x2="55" y2="242" stroke="#3d6480" stroke-width="4" stroke-linecap="round"/>
      <circle cx="130" cy="197" r="5.5" fill="#0d1b2a" stroke="#5a8aa0" stroke-width="2"/>
      <circle cx="55" cy="242" r="4.5" fill="#1a3050" stroke="#4a7a90" stroke-width="1.5"/>
      <circle cx="205" cy="242" r="4.5" fill="#1a3050" stroke="#4a7a90" stroke-width="1.5"/>

      <!-- Stage 1 bot: corners at (55,242),(205,242),(55,330),(205,330) -->
      <line x1="55" y1="242" x2="205" y2="330" stroke="#304f65" stroke-width="4" stroke-linecap="round"/>
      <line x1="205" y1="242" x2="55" y2="330" stroke="#304f65" stroke-width="4" stroke-linecap="round"/>
      <circle cx="130" cy="286" r="5.5" fill="#0d1b2a" stroke="#4a7a90" stroke-width="2"/>
      <circle cx="55" cy="330" r="4.5" fill="#152336" stroke="#4a7a90" stroke-width="1.5"/>
      <circle cx="205" cy="330" r="4.5" fill="#152336" stroke="#4a7a90" stroke-width="1.5"/>

      <!-- Subtle vertical guide rails -->
      <line x1="55" y1="62" x2="55" y2="330" stroke="#1e3352" stroke-width="1.5" stroke-dasharray="2,6" opacity="0.35"/>
      <line x1="205" y1="62" x2="205" y2="330" stroke="#1e3352" stroke-width="1.5" stroke-dasharray="2,6" opacity="0.35"/>

      <!-- ACUTE PLATFORM lower -->
      <rect x="30" y="330" width="200" height="14" rx="3" fill="#1e3352" stroke="#4a7fb5" stroke-width="1.5"/>
      <rect x="54" y="318" width="24" height="14" rx="2" fill="#4a7fb5" opacity="0.55"/>
      <rect x="84" y="320" width="18" height="12" rx="2" fill="#4a7fb5" opacity="0.4"/>
      <rect x="110" y="317" width="28" height="15" rx="2" fill="#4a7fb5" opacity="0.5"/>
      <rect x="146" y="319" width="22" height="13" rx="2" fill="#4a7fb5" opacity="0.45"/>
      <text x="130" y="360" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="12" font-weight="600" fill="#6a9fd4">Acute Treatment</text>
      <text x="130" y="373" text-anchor="middle" font-family="'Source Sans 3',sans-serif" font-size="9.5" fill="rgba(245,240,232,0.5)">medications and dosing</text>

      <!-- BASE + WHEELS -->
      <rect x="28" y="344" width="204" height="12" rx="3" fill="#152336" stroke="#2a4060" stroke-width="1"/>
      <circle cx="70" cy="368" r="14" fill="#0f1e2e" stroke="#2a4060" stroke-width="2"/>
      <circle cx="70" cy="368" r="6" fill="#0d1b2a" stroke="#3a5a70" stroke-width="1"/>
      <line x1="64" y1="362" x2="76" y2="374" stroke="#3a5a70" stroke-width="1" opacity="0.5"/>
      <line x1="76" y1="362" x2="64" y2="374" stroke="#3a5a70" stroke-width="1" opacity="0.5"/>
      <circle cx="190" cy="368" r="14" fill="#0f1e2e" stroke="#2a4060" stroke-width="2"/>
      <circle cx="190" cy="368" r="6" fill="#0d1b2a" stroke="#3a5a70" stroke-width="1"/>
      <line x1="184" y1="362" x2="196" y2="374" stroke="#3a5a70" stroke-width="1" opacity="0.5"/>
      <line x1="196" y1="362" x2="184" y2="374" stroke="#3a5a70" stroke-width="1" opacity="0.5"/>
      <rect x="70" y="354" width="120" height="6" rx="2" fill="#152336" stroke="#2a4060" stroke-width="1"/>

      <!-- UPWARD ARROW -->
      <line x1="234" y1="326" x2="234" y2="72" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
      <polygon points="234,58 228,76 240,76" fill="#c9a84c" opacity="0.6"/>
      <!-- Annotation beside arrow -->
      <text transform="translate(252,240) rotate(-90)" text-anchor="middle"
            font-family="'Playfair Display',serif" font-size="14" font-style="italic"
            fill="#c9a84c" opacity="0.85">Getting there takes more. Staying there takes less.</text>

    </svg>
  </div>

</div>
</body>
</html>
